name: build

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - run: dotnet test PC_Scheduler/PCScheduler.Tests --configuration Release --logger trx

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $tag = "v$(Get-Date -Format 'yy.Mdd.HHmm')"
          dotnet publish PC_Scheduler/PCScheduler -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version="$tag" -p:BUILD_VERSION="$tag" -o publish

      - name: Create Release
        shell: pwsh
        run: |
          # delete all old releases
          gh release list --limit 50 --json tagName | ConvertFrom-Json | % {
            gh release delete $_.tagName --yes --cleanup-tag 2>$null
          }
          $tag = "v$(Get-Date -Format 'yy.Mdd.HHmm')"
          gh release create $tag publish/PCScheduler.exe --title "PCScheduler $tag" --notes "Автоматическая сборка"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
