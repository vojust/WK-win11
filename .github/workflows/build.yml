name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r PC_Scheduler/requirements.txt

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name "PC_Scheduler" PC_Scheduler/main.py

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: PC_Scheduler
          path: dist/PC_Scheduler.exe
