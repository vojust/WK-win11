name: build

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - run: dotnet test PC_Scheduler/PCScheduler.Tests --configuration Release --logger trx

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish single-file exe
        run: |
          dotnet publish PC_Scheduler/PCScheduler -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Create Release
        run: |
          gh release create "v${{ github.run_number }}.${{ github.run_attempt }}" `
            publish/PCScheduler.exe `
            --title "PCScheduler v${{ github.run_number }}.${{ github.run_attempt }}" `
            --notes "Автоматическая сборка от $(date -u '+%Y-%m-%d %H:%M UTC')"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
