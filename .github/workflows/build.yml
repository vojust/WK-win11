name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest tests.test_main -v

  build:
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r PC_Scheduler/requirements.txt

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "PC_Scheduler" PC_Scheduler/main.py

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC_Scheduler
          path: dist/PC_Scheduler.exe

      - name: Create Release (public)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $tag = "build-$($env:GITHUB_SHA.Substring(0,8))"
          Write-Output "Tag: $tag"

          # Create release via API
          $body = @{
            tag_name = $tag
            name = "PC Scheduler ($tag)"
            body = "Автоматическая сборка"
            prerelease = $false
          } | ConvertTo-Json

          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases" `
            -Method Post `
            -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN" } `
            -ContentType "application/json" `
            -Body $body

          Write-Output "Release created: $($release.html_url)"

          # Upload exe
          $uploadUrl = $release.upload_url -replace "\{.*\}", "?name=PC_Scheduler.exe"
          $exeBytes = [System.IO.File]::ReadAllBytes("dist\PC_Scheduler.exe")
          Invoke-RestMethod -Uri $uploadUrl `
            -Method Post `
            -Headers @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              "Content-Type" = "application/octet-stream"
            } `
            -Body $exeBytes

          Write-Output "Asset uploaded"
