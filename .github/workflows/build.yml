name: build

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"
      - run: dotnet test PC_Scheduler/PCScheduler.Tests --configuration Release --logger trx

  build:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Publish single-file exe
        run: |
          $tag = "v$(Get-Date -Format 'yy.Mdd.HHmm')"
          dotnet publish PC_Scheduler/PCScheduler -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:BUILD_VERSION=$tag -o publish
          Rename-Item publish/PCScheduler.exe "PCScheduler-$tag.exe"
          echo $tag > publish/TAG

      - name: Create Release
        shell: pwsh
        run: |
          $tag = (Get-Content publish/TAG).Trim()
          $file = "publish/PCScheduler-$tag.exe"
          gh release create $tag $file --title "PCScheduler $tag" --notes "Автоматическая сборка"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate README
        shell: pwsh
        run: |
          $tag = (Get-Content publish/TAG).Trim()
          & .\scripts\generate-readme.ps1 -Tag $tag | Out-File -FilePath README.md -Encoding utf8

      - name: Commit README
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "Update README [skip ci]" && git push || echo "No changes to commit"
