name: Build Windows exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest tests.test_main -v

  build:
    runs-on: windows-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r PC_Scheduler/requirements.txt

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "PC_Scheduler" PC_Scheduler/main.py

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PC_Scheduler
          path: dist/PC_Scheduler.exe

      - name: Create Release (public)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="build-${GITHUB_SHA:0:8}"
          gh release create "$TAG" dist/PC_Scheduler.exe \
            --title "PC Scheduler (build $TAG)" \
            --notes "Автоматическая сборка после пуша в main" \
            --latest
